<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pakistan Gas Bill Estimator – SNGPL & SSGC</title>
  <meta name="description" content="Estimate your Pakistan gas bill using meter readings and billing dates. Supports SNGPL & SSGC. Free, fast, no signup.">
  <meta name="robots" content="index, follow">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav>
    <a href="index.html">Home</a> |
    <a href="about.html">About</a>
  </nav>

  <div class="container">
    <h1>Gas Bill Estimator</h1>

    <button id="meter-toggle">Toggle Meter Mode</button>

    <form id="bill-form">
      <div>
        <label>Previous Reading Date:</label>
        <input type="date" id="prev-date" required>
      </div>

      <div>
        <label>Previous Reading (m³):</label>
        <input type="text" id="prev-value" inputmode="numeric">
        <div class="meter-display" id="prev-meter"></div>
      </div>

      <div>
        <label>Current Reading Date:</label>
        <input type="date" id="curr-date" required>
      </div>

      <div>
        <label>Current Reading (m³):</label>
        <input type="text" id="curr-value" inputmode="numeric">
        <div class="meter-display" id="curr-meter"></div>
      </div>

      <div>
        <label>User Type:</label>
        <select id="user-type">
          <option value="protected">Protected</option>
          <option value="nonProtected">Non-Protected</option>
        </select>
      </div>

      <button type="submit">Calculate Bill</button>
    </form>

    <div id="results">
      <h2>Results</h2>
      <div id="bill-summary"></div>
    </div>

    <div id="slider-container">
      <h2>Daily Usage Simulation</h2>
      <input type="range" id="daily-slider" min="0" max="33" step="0.1">
      <span id="slider-value">0 m³/day</span>
      <div id="slider-marker">Current Avg: 0 m³/day</div>
      <div id="slider-bill"></div>
    </div>

    <div id="history-container">
      <h2>History</h2>
      <ul id="history-list"></ul>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
