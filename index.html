<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pakistan Gas Bill Estimator – SNGPL & SSGC</title>
  <meta name="description" content="Estimate your Pakistan gas bill using meter readings and billing dates. Supports SNGPL & SSGC. Free, fast, no signup.">
  <meta name="robots" content="index, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </nav>

    <div class="top-row">
      <h1>Gas Bill Estimator</h1>
      <div class="toggle-pill">
        <button class="toggle-opt active" data-value="protected">Protected</button>
        <button class="toggle-opt" data-value="nonProtected">Non-protected</button>
      </div>
    </div>

    <!-- 1. Readings card -->
    <div class="card" id="readings-card">
      <div class="card-label">Meter readings</div>
      <div class="readings-grid">
        <div class="reading-col">
          <div class="reading-label">Previous</div>
          <input type="date" id="prev-date" required>
          <input type="text" id="prev-value" inputmode="numeric" placeholder="00000" autocomplete="off">
          <div class="meter-display" id="prev-meter"></div>
        </div>
        <div class="reading-col">
          <div class="reading-label">Current</div>
          <input type="date" id="curr-date" required>
          <input type="text" id="curr-value" inputmode="numeric" placeholder="00000" autocomplete="off">
          <div class="meter-display" id="curr-meter"></div>
        </div>
      </div>
      <button id="calc-btn">Calculate</button>
    </div>

    <!-- 2. Usage summary card -->
    <div class="card hidden" id="usage-card">
      <div class="card-label">Your usage this period</div>
      <div class="usage-big" id="usage-display">— m³</div>
      <div class="usage-sub" id="usage-sub">— days · — m³/day average</div>
    </div>

    <!-- 3. Bill result card -->
    <div class="card hidden" id="result-card">
      <div class="card-label">Projected monthly bill</div>
      <div class="bill-row"><span>Gas charges</span><span id="r-gas">—</span></div>
      <div class="bill-row"><span>Fixed charges</span><span id="r-fixed">—</span></div>
      <div class="bill-row"><span id="r-gst-label">GST</span><span id="r-gst">—</span></div>
      <div class="bill-row total"><span>Estimated bill</span><span id="r-total">—</span></div>
      <button class="collapse-btn" id="slab-toggle">▶ Show slab breakdown</button>
      <div class="slab-breakdown hidden" id="slab-breakdown"></div>
    </div>

    <!-- 4. What-if card -->
    <div class="card hidden" id="whatif-card">
      <div class="card-label">What if my usage changes?</div>
      <div class="actual-avg" id="actual-avg">Your actual avg: — m³/day</div>
      <div class="slider-row">
        <button class="adj-btn" id="minus-btn">−</button>
        <input type="range" id="daily-slider" min="0" max="50" step="0.5" value="0">
        <button class="adj-btn" id="plus-btn">+</button>
        <span class="slider-val" id="slider-val">—</span>
        <span class="unit-label">m³/day</span>
      </div>
      <div class="delta-box" id="delta-box"></div>
      <button class="collapse-btn hidden" id="whatif-slab-toggle">▶ Show slab breakdown</button>
      <div class="slab-breakdown hidden" id="whatif-slab"></div>
    </div>

    <!-- 5. History card -->
    <div class="card" id="history-card">
      <div class="card-label">History</div>
      <ul id="history-list"></ul>
      <div class="history-empty hidden" id="history-empty">No entries yet</div>
    </div>

  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
